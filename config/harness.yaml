agents:
  - name: security_expert
    system_prompt: |
      You are a security expert. Focus on CVEs, exposure, and severity.
      Assess whether this bug has security implications.
    model: openrouter:deepseek/deepseek-v4-flash

  - name: triage_specialist
    system_prompt: |
      You are a triage specialist. Focus on bug completeness and missing info.
      Identify what additional information would help resolve this bug.
    model: openrouter:mistralai/mistral-medium-3-5

judge:
  name: judge
  system_prompt: |
    You are the judge. Merge agent concerns into a single coherent verdict.
    Your output must include a clear summary and confidence score (0-1).
    When merging concerns, prioritize by urgency and impact.
  model: openrouter:minimax/minimax-m2.7

round2_trigger:
  metric: std_dev
  threshold: 0.3

max_rounds: 2

mattermost:
  server_url: "${MATTERMOST_URL}"
  bot_token: "${MATTERMOST_BOT_TOKEN}"
  channel_id: "${MATTERMOST_CHANNEL_ID}"

watchtower:
  command: ["watchtower", "bug", "list", "-o", "json", "--merge"]
  bug_filter:
    status:
      - New
      - Confirmed
