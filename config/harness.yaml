agents:
  - name: developer
    system_prompt_file: ../agents/developer.md
    model: openrouter:minimax/minimax-m2.7

  - name: sre
    system_prompt_file: ../agents/sre.md
    model: openrouter:mistralai/mistral-medium-3-5

  - name: product_manager
    system_prompt_file: ../agents/product_manager.md
    model: openrouter:moonshotai/kimi-k2.6

judge:
  name: judge
  system_prompt_file: ../agents/judge.md
  model: openrouter:deepseek/deepseek-v4-pro

round2_trigger:
  metric: std_dev
  threshold: 0.3

max_rounds: 2

mattermost:
  server_url: "${MATTERMOST_URL}"
  bot_token: "${MATTERMOST_BOT_TOKEN}"
  channel_id: "${MATTERMOST_CHANNEL_ID}"

watchtower:
  command: ["watchtower", "bug", "list", "-o", "json", "--merge"]
  bug_filter:
    status:
      - New
      - Confirmed
