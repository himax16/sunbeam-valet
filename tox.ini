[tox]
requires =
    tox>=4.23
    tox-uv>=1.25
env_list = lint, unit

[testenv]
package = editable
set_env =
    PYTHONPATH = {tox_root}/lib:{tox_root}/src

[testenv:lint]
description = run all linters and pre-commit hooks
dependency_groups = dev
commands =
    pre-commit run --all-files

[testenv:format]
description = auto-fix lint + format
skip_install = true
deps = ruff
commands =
    ruff check --fix {posargs:src tests lib}
    ruff format {posargs:src tests lib}

[testenv:unit]
description = run unit tests with coverage
dependency_groups = test
commands =
    coverage run -m pytest {posargs:tests/unit}
    coverage report
